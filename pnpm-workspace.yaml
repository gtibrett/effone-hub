packages:
  - 'packages/database'
  - 'packages/site'
  - 'packages/api'
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
# Audit-patch overrides (build-time only). graphql-codegen v5 transitively
# depends on lodash 4.17.23 and postcss <8.4.31 which carry advisories
# GHSA-r5fr-rjxr-66jc and GHSA-7fh5-64p2-3v2j respectively. graphql-codegen
# v7 is the upstream fix path but its client-preset v6 stopped emitting
# schema entity types this codebase relies on — see D4 commit. Pin here
# until Track B / a future codegen refactor.
overrides:
  lodash: ^4.18.0
  postcss: ^8.5.10
  # esbuild <0.28.1: RCE via NPM_CONFIG_REGISTRY in the Deno module + dev-server
  # arbitrary file read on Windows (GHSA-gv7w-rqvm-qjhr, GHSA-g7r4-m6w7-qqqr).
  # Transitive via tsx; 0.28.1 is a patch bump.
  'esbuild@>=0.17.0 <0.28.1': 0.28.1
  # d3-color <3.1.0: ReDoS (GHSA-36jr-mh4h-2g58). Vulnerable 2.0.0 arrives via
  # react-simple-maps' d3-zoom@2 chain; 3.1.0 already runs under @mui/x-charts.
  'd3-color@<3.1.0': 3.1.0
  # js-yaml <4.2.0: quadratic-complexity DoS in merge-key handling
  # (GHSA-h67p-54hq-rp68). 3.x copy (via @istanbuljs/load-nyc-config) calls
  # .load(), which exists in v4, so the major bump is safe here.
  'js-yaml@<4.2.0': 4.2.0
# react-simple-maps upstream stopped at React 18 in its peer dep but the
# runtime is React-version-agnostic (d3-geo + SVG, no React internals).
# Suppress the peer warning rather than papering over with --legacy-peer-deps.
peerDependencyRules:
  allowedVersions:
    'react-simple-maps>react': '19'
    'react-simple-maps>react-dom': '19'
