name: F1DB ingest

# Runs the full ingest pipeline (dump-and-swap + Jolpica lap-times backfill)
# from a GitHub Actions runner. Replaces the Vercel cron that hit
# /api/cron/ingest, which couldn't fit the ~5-minute job inside the 60s
# Hobby-plan function timeout.
#
# After the heavy lifting, the runner POSTs /api/cron/revalidate so
# Cache Components tags get invalidated on the production deployment.

on:
  schedule:
    # 06:00 UTC daily — same cadence the Vercel cron used.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max_lap_races:
        description: 'Cap on lap-time backfills per run (default 500).'
        required: false
        default: '500'

concurrency:
  group: f1db-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # All ${{ ... }} substitutions are bound to env vars (never inlined into
      # `run:` commands) so untrusted workflow_dispatch inputs can't shell-inject.
      POSTGRES_URL:   ${{ secrets.POSTGRES_URL }}
      CRON_SECRET:    ${{ secrets.CRON_SECRET }}
      REVALIDATE_URL: ${{ vars.REVALIDATE_URL }}
      MAX_LAP_RACES:  ${{ inputs.max_lap_races }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup yarn cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        env:
          # @gtibrett/* packages live on GitHub Packages; auth via the built-in
          # GITHUB_TOKEN (read:packages scope is granted via permissions: below).
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --frozen-lockfile

      - name: Run ingest
        run: yarn tsx scripts/run-ingest.ts

    permissions:
      contents: read
      packages: read
